version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stockbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stock_signal_bot
      POSTGRES_USER: stockbot
      POSTGRES_PASSWORD: stockbot_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbot -d stock_signal_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: stockbot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: stockbot
      DB_PASSWORD: stockbot_secret
      DB_DATABASE: stock_signal_bot
      NODE_ENV: production
      SIGNALS_OUTPUT_DIR: ./data/signals
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./data/signals:/app/data/signals

volumes:
  postgres_data:
